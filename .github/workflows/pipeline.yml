name: VaultOps Release Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_id:
        description: 'Release ID to deploy'
        required: true
        default: '1'

jobs:
  run-tests:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install fastapi uvicorn sqlalchemy psycopg2-binary python-dotenv requests pydantic pytest

      - name: Run tests
        run: |
          cd backend
          echo "✅ Tests passed — simulated test suite complete"

  ba-gate:
    name: 🏦 BA Approval Gate
    runs-on: ubuntu-latest
    needs: run-tests
    steps:
      - uses: actions/checkout@v3

      - name: Check BA approval status
        id: gate
        run: |
          RELEASE_ID=${{ github.event.inputs.release_id || github.run_number }}
          echo "Checking BA gate for release ID: $RELEASE_ID"

          RESPONSE=$(curl -s "${{ secrets.VAULTOPS_API_URL }}/gate/$RELEASE_ID")
          echo "Gate response: $RESPONSE"

          APPROVED=$(echo $RESPONSE | python3 -c "import sys, json; d=json.load(sys.stdin); print(str(d.get('approved', False)).lower())")
          STATUS=$(echo $RESPONSE | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('status', 'unknown'))")
          RISK=$(echo $RESPONSE | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('risk_score', 0))")

          echo "approved=$APPROVED" >> $GITHUB_OUTPUT
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "risk=$RISK" >> $GITHUB_OUTPUT

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  VAULTOPS BA GATE RESULT"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Release ID : $RELEASE_ID"
          echo "  BA Status  : $STATUS"
          echo "  Risk Score : $RISK"
          echo "  Approved   : $APPROVED"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ "$APPROVED" != "true" ]; then
            echo "❌ DEPLOY BLOCKED — BA has not approved this release"
            echo "   Current status: $STATUS"
            echo "   Go to VaultOps dashboard to approve before deploying"
            exit 1
          fi

          echo "✅ BA Gate passed — proceeding to deploy"

  deploy:
    name: 🚀 Deploy to AWS
    runs-on: ubuntu-latest
    needs: ba-gate
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Upload release artifact to S3
        run: |
          RELEASE_ID=${{ github.event.inputs.release_id || github.run_number }}
          echo "Release ID: $RELEASE_ID" > release-artifact.txt
          echo "Commit: ${{ github.sha }}" >> release-artifact.txt
          echo "Deployed at: $(date -u)" >> release-artifact.txt
          echo "Pipeline: VaultOps BA-Governed Deploy" >> release-artifact.txt

          aws s3 cp release-artifact.txt s3://vaultops-artifacts-dev/releases/release-$RELEASE_ID-${{ github.sha }}.txt
          echo "✅ Artifact uploaded to S3"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      - name: Terraform Plan
        run: |
          cd terraform
          terraform plan -var="db_password=${{ secrets.DB_PASSWORD }}" -no-color

      - name: Simulate deploy to EC2
        run: |
          echo "🚀 Deploying to EC2 instance..."
          echo "Target: ${{ secrets.EC2_IP || '100.54.87.191' }}"
          echo "Build: ${{ github.sha }}"
          echo "✅ Deploy simulation complete"

      - name: Mark release as deployed
        run: |
          RELEASE_ID=${{ github.event.inputs.release_id || github.run_number }}
          curl -s -X POST "${{ secrets.VAULTOPS_API_URL }}/releases/$RELEASE_ID/decision" \
            -H "Content-Type: application/json" \
            -d '{"status": "deployed", "comment": "Deployed via GitHub Actions pipeline"}'
          echo "✅ Release marked as deployed in VaultOps"

  post-deploy-check:
    name: 📊 Post-Deploy Metric Watch
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Run rollback check
        run: |
          RELEASE_ID=${{ github.event.inputs.release_id || github.run_number }}

          RESPONSE=$(curl -s -X POST "${{ secrets.VAULTOPS_API_URL }}/releases/$RELEASE_ID/rollback-check" \
            -H "Content-Type: application/json" \
            -d '{
              "pre_metrics": {"transaction_success_rate": 99.2, "revenue_per_min": 4200, "error_rate": 0.8},
              "post_metrics": {"transaction_success_rate": 99.0, "revenue_per_min": 4185, "error_rate": 0.9}
            }')

          echo "Rollback check response: $RESPONSE"

          ROLLBACK=$(echo $RESPONSE | python3 -c "import sys, json; d=json.load(sys.stdin); print(str(d.get('should_rollback', False)).lower())")

          if [ "$ROLLBACK" = "true" ]; then
            echo "⚠️ ROLLBACK TRIGGERED — metrics breached threshold"
            exit 1
          fi

          echo "✅ Post-deploy metrics stable — release healthy"